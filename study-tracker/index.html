<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172554">
  <meta name="description" content="机器学习平台产品设计实战手册的16周学习、打卡与测验程序。">
  <title>机器学习平台产品设计 · 16周学习营</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#app">跳到主要内容</a>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#/dashboard" aria-label="返回学习首页">
        <span class="brand-mark" aria-hidden="true">ML</span>
        <span><strong>机器学习平台产品设计</strong><small>16周学习营</small></span>
      </a>
      <div class="topbar-actions">
        <span id="week-pill" class="week-pill">第1周</span>
        <button id="install-button" class="button ghost compact" type="button" hidden>安装应用</button>
      </div>
    </header>

    <nav class="side-nav" aria-label="主要导航">
      <a href="#/dashboard" data-route="dashboard"><span aria-hidden="true">⌂</span>学习首页</a>
      <a href="#/plan" data-route="plan"><span aria-hidden="true">▦</span>16周计划</a>
      <a href="#/review" data-route="review"><span aria-hidden="true">✓</span>测验复习</a>
      <a href="#/stats" data-route="stats"><span aria-hidden="true">↗</span>学习统计</a>
      <a href="#/settings" data-route="settings"><span aria-hidden="true">⚙</span>数据设置</a>
    </nav>

    <main id="app" tabindex="-1" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="移动端导航">
      <a href="#/dashboard" data-route="dashboard"><span aria-hidden="true">⌂</span><small>首页</small></a>
      <a href="#/plan" data-route="plan"><span aria-hidden="true">▦</span><small>计划</small></a>
      <a href="#/review" data-route="review"><span aria-hidden="true">✓</span><small>测验</small></a>
      <a href="#/stats" data-route="stats"><span aria-hidden="true">↗</span><small>统计</small></a>
      <a href="#/settings" data-route="settings"><span aria-hidden="true">⚙</span><small>设置</small></a>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="update-banner" class="update-banner" hidden>
    <span>学习程序已有新版本。</span>
    <button id="reload-button" class="button compact" type="button">刷新更新</button>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
